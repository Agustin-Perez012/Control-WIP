<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Gerencial Financiero - Muebles Orlandi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; color: #333; }
        header { background-color: #2c3e50; color: white; padding: 20px; text-align: center; }
        header h1 { margin: 0; font-size: 26px; }
        .container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }
        
        .config-panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 5px solid #3498db; }
        .config-panel h3 { margin-top: 0; color: #2c3e50; margin-bottom: 15px; }
        
        .config-row { display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 15px; }
        .input-group { flex: 1; min-width: 200px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #555; }
        .input-group input[type="file"], .input-group input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; background: #f9f9f9; font-size: 15px; }
        
        button { flex: 1; min-width: 200px; background-color: #27ae60; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; height: 42px; transition: 0.2s; }
        button:hover { background-color: #219653; }
        
        .dashboard-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; display: none; }
        
        .wip-card { background: white; padding: 20px; border-radius: 8px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .wip-card h2 { margin: 0; font-size: 32px; }
        .wip-card p { margin: 5px 0 0 0; font-size: 14px; font-weight: bold; text-transform: uppercase; color: #7f8c8d; }
        .costo-texto { font-size: 20px !important; color: #2c3e50 !important; margin-top: 10px !important; border-top: 1px solid #eee; padding-top: 10px; }

        .card-total { border-bottom: 5px solid #2c3e50; background-color: #e8f8f5; } .card-total h2 { color: #16a085; font-size: 40px; }
        .card-seccionadora { border-bottom: 5px solid #f39c12; } .card-seccionadora h2 { color: #f39c12; }
        .card-linea { border-bottom: 5px solid #3498db; } .card-linea h2 { color: #3498db; }
        .card-embalaje { border-bottom: 5px solid #27ae60; } .card-embalaje h2 { color: #27ae60; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: none; margin-bottom: 50px;}
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #2c3e50; color: white; }
        tr:hover { background-color: #f9f9f9; }
        
        .badge { padding: 5px 10px; border-radius: 15px; font-size: 12px; font-weight: bold; color: white; }
        .bg-seccionadora { background-color: #f39c12; }
        .bg-linea { background-color: #3498db; }
        .bg-embalaje { background-color: #27ae60; }
        
        .text-money { color: #27ae60; font-weight: bold; font-size: 15px;}
        .m2-breakdown { font-size: 13px; color: #555; line-height: 1.4; }
    </style>
</head>
<body>

    <header>
        <h1>Muebles Orlandi - Monitor Financiero y Productivo</h1>
    </header>

    <div class="container">
        
        <div class="config-panel">
            <h3>⚙️ Sincronización y Costos por Espesor</h3>
            
            <div class="config-row">
                <div class="input-group" style="flex: 2;">
                    <label>📂 Archivo de Despiece Maestro (.csv):</label>
                    <input type="file" id="archivoMaestro" accept=".csv">
                </div>
            </div>

            <div class="config-row">
                <div class="input-group">
                    <label>💵 Placa 15mm ($/m²):</label>
                    <input type="number" id="costo15" placeholder="Ej: 5500" value="0">
                </div>
                <div class="input-group">
                    <label>💵 Placa 12mm ($/m²):</label>
                    <input type="number" id="costo12" placeholder="Ej: 4500" value="0">
                </div>
                <div class="input-group">
                    <label>💵 Fondo 3mm ($/m²):</label>
                    <input type="number" id="costo3" placeholder="Ej: 2500" value="0">
                </div>
                <button onclick="procesarDatos()">🔄 Sincronizar y Calcular</button>
            </div>
        </div>

        <div class="dashboard-cards" id="panel-tarjetas">
            <div class="wip-card card-total">
                <h2 id="total-piezas-general">0</h2>
                <p>Piezas Totales en Fábrica</p>
                <p class="costo-texto" id="costo-general">$ 0</p>
            </div>
            <div class="wip-card card-seccionadora">
                <h2 id="total-piezas-seccionadora">0</h2>
                <p>Seccionadora</p>
                <p class="costo-texto" id="costo-seccionadora">$ 0</p>
            </div>
            <div class="wip-card card-linea">
                <h2 id="total-piezas-linea">0</h2>
                <p>Línea / Agujereadora</p>
                <p class="costo-texto" id="costo-linea">$ 0</p>
            </div>
            <div class="wip-card card-embalaje">
                <h2 id="total-piezas-embalaje">0</h2>
                <p>Embalaje</p>
                <p class="costo-texto" id="costo-embalaje">$ 0</p>
            </div>
        </div>

        <table id="tabla-detalles">
            <thead>
                <tr>
                    <th>Serie</th>
                    <th>Producto</th>
                    <th>Sector Actual</th>
                    <th>Cant. Muebles</th>
                    <th>Piezas Circulando</th>
                    <th>Consumo (m²)</th> <th>Costo Inmovilizado</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla">
            </tbody>
        </table>
    </div>

    <script>
        // ==========================================
        // ⚙️ TUS LINKS YA CONFIGURADOS
        // ==========================================
        const LINK_SECCIONADORA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-tCcMntP0sT_WZrZ8eMy8YP5d6hWFl-4Y5zGpWwboFQIvqAikDwh8BbvisqfawWq23jfl5zm0RxUT/pub?gid=0&single=true&output=csv";
        const LINK_LINEA        = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-tCcMntP0sT_WZrZ8eMy8YP5d6hWFl-4Y5zGpWwboFQIvqAikDwh8BbvisqfawWq23jfl5zm0RxUT/pub?gid=108164202&single=true&output=csv";
        const LINK_EMBALAJE     = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-tCcMntP0sT_WZrZ8eMy8YP5d6hWFl-4Y5zGpWwboFQIvqAikDwh8BbvisqfawWq23jfl5zm0RxUT/pub?gid=461331950&single=true&output=csv";
        // ==========================================

        let catalogoData = {}; 
        
        let totalWipGeneral = 0; let costoWipGeneral = 0;
        let totalSeccionadora = 0; let costoSeccionadora = 0;
        let totalLinea = 0; let costoLinea = 0;
        let totalEmbalaje = 0; let costoEmbalaje = 0;
        
        let filasHTML = "";
        let precio15 = 0; let precio12 = 0; let precio3 = 0;

        const formatearPlata = (numero) => {
            return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(numero);
        };

        async function procesarDatos() {
            const inputArchivo = document.getElementById('archivoMaestro');
            
            precio15 = parseFloat(document.getElementById('costo15').value) || 0;
            precio12 = parseFloat(document.getElementById('costo12').value) || 0;
            precio3 = parseFloat(document.getElementById('costo3').value) || 0;

            if (!inputArchivo.files[0]) {
                alert("Por favor, selecciona primero el archivo Maestro de Despiece CSV.");
                return;
            }

            totalWipGeneral = 0; costoWipGeneral = 0;
            totalSeccionadora = 0; costoSeccionadora = 0;
            totalLinea = 0; costoLinea = 0;
            totalEmbalaje = 0; costoEmbalaje = 0;
            filasHTML = "";

            const reader = new FileReader();
            reader.onload = async function(e) {
                const lineasMaestro = e.target.result.split('\n');
                catalogoData = {}; 

                for (let i = 1; i < lineasMaestro.length; i++) {
                    const columnas = lineasMaestro[i].split(';'); 
                    
                    if (columnas.length >= 7) {
                        const sku = columnas[0].trim();
                        const cantidad = parseInt(columnas[3].trim());
                        const largo = parseFloat(columnas[4].trim().replace(',', '.'));
                        const ancho = parseFloat(columnas[5].trim().replace(',', '.'));
                        const espesor = parseInt(columnas[6].trim()); 

                        if (!isNaN(cantidad) && !isNaN(largo) && !isNaN(ancho) && !isNaN(espesor) && sku !== "") {
                            if (!catalogoData[sku]) {
                                catalogoData[sku] = { piezasTotales: 0, m2_15: 0, m2_12: 0, m2_3: 0 };
                            }
                            
                            catalogoData[sku].piezasTotales += cantidad;
                            const areaM2 = (largo * ancho) / 1000000;
                            const areaTotalDeEstaPieza = areaM2 * cantidad;

                            if (espesor === 15) {
                                catalogoData[sku].m2_15 += areaTotalDeEstaPieza;
                            } else if (espesor === 12) {
                                catalogoData[sku].m2_12 += areaTotalDeEstaPieza;
                            } else if (espesor === 3) {
                                catalogoData[sku].m2_3 += areaTotalDeEstaPieza;
                            }
                        }
                    }
                }
                
                await procesarHoja(LINK_SECCIONADORA, "SECCIONADORA", "bg-seccionadora");
                await procesarHoja(LINK_LINEA, "LÍNEA", "bg-linea");
                await procesarHoja(LINK_EMBALAJE, "EMBALAJE", "bg-embalaje");

                document.getElementById('total-piezas-general').innerText = totalWipGeneral.toLocaleString('es-AR');
                document.getElementById('total-piezas-seccionadora').innerText = totalSeccionadora.toLocaleString('es-AR');
                document.getElementById('total-piezas-linea').innerText = totalLinea.toLocaleString('es-AR');
                document.getElementById('total-piezas-embalaje').innerText = totalEmbalaje.toLocaleString('es-AR');
                
                document.getElementById('costo-general').innerText = formatearPlata(costoWipGeneral);
                document.getElementById('costo-seccionadora').innerText = formatearPlata(costoSeccionadora);
                document.getElementById('costo-linea').innerText = formatearPlata(costoLinea);
                document.getElementById('costo-embalaje').innerText = formatearPlata(costoEmbalaje);

                document.getElementById('cuerpo-tabla').innerHTML = filasHTML;
                document.getElementById('panel-tarjetas').style.display = "grid";
                document.getElementById('tabla-detalles').style.display = "table";
            };
            reader.readAsText(inputArchivo.files[0]);
        }

        async function procesarHoja(url, nombreSector, claseColor) {
            try {
                const respuesta = await fetch(url);
                const datosTexto = await respuesta.text();
                const lineasOp = datosTexto.split('\n');

                for (let i = 1; i < lineasOp.length; i++) {
                    const columnasOp = lineasOp[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); 

                    if (columnasOp.length >= 6) {
                        const sku = columnasOp[0].trim();
                        const descripcion = columnasOp[1].trim().replace(/^"|"$/g, ''); 
                        const serie = columnasOp[2].trim();
                        const cantidadMuebles = parseInt(columnasOp[4].trim());
                        const estado = columnasOp[5].trim().replace(/^"|"$/g, '').toUpperCase(); 

                        if (estado === "EN PROCESO") {
                            const infoMueble = catalogoData[sku] || { piezasTotales: 0, m2_15: 0, m2_12: 0, m2_3: 0 }; 
                            
                            const wipPiezas = cantidadMuebles * infoMueble.piezasTotales;
                            
                            // Calculamos m2 consumidos por esta serie entera
                            const totalM2_15 = cantidadMuebles * infoMueble.m2_15;
                            const totalM2_12 = cantidadMuebles * infoMueble.m2_12;
                            const totalM2_3 = cantidadMuebles * infoMueble.m2_3;

                            const costoSerie15 = totalM2_15 * precio15;
                            const costoSerie12 = totalM2_12 * precio12;
                            const costoSerie3 = totalM2_3 * precio3;
                            const costoSerieTotal = costoSerie15 + costoSerie12 + costoSerie3;

                            totalWipGeneral += wipPiezas;
                            costoWipGeneral += costoSerieTotal;

                            if (nombreSector === "SECCIONADORA") { totalSeccionadora += wipPiezas; costoSeccionadora += costoSerieTotal; }
                            if (nombreSector === "LÍNEA") { totalLinea += wipPiezas; costoLinea += costoSerieTotal; }
                            if (nombreSector === "EMBALAJE") { totalEmbalaje += wipPiezas; costoEmbalaje += costoSerieTotal; }

                            // Armamos el texto del desglose de m2 solo si llevan más de 0
                            let desgloseM2 = "";
                            if (totalM2_15 > 0) desgloseM2 += `15mm: <strong>${totalM2_15.toFixed(2)}</strong> m²<br>`;
                            if (totalM2_12 > 0) desgloseM2 += `12mm: <strong>${totalM2_12.toFixed(2)}</strong> m²<br>`;
                            if (totalM2_3 > 0) desgloseM2 += `3mm: <strong>${totalM2_3.toFixed(2)}</strong> m²`;
                            if (desgloseM2 === "") desgloseM2 = "-";

                            filasHTML += `
                                <tr>
                                    <td><strong>${serie}</strong></td>
                                    <td>${descripcion} <br><small>SKU: ${sku}</small></td>
                                    <td><span class="badge ${claseColor}">${nombreSector}</span></td>
                                    <td>${cantidadMuebles}</td>
                                    <td><strong>${wipPiezas.toLocaleString('es-AR')}</strong></td>
                                    <td class="m2-breakdown">${desgloseM2}</td>
                                    <td class="text-money">${formatearPlata(costoSerieTotal)}</td>
                                </tr>
                            `;
                        }
                    }
                }
            } catch (error) {
                console.error(`Error al leer la hoja de ${nombreSector}`, error);
            }
        }
    </script>
</body>

</html>
